root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
cmd = "go build -buildvcs=false -o ./tmp/aegisflow-mcp ."
bin = "./tmp/aegisflow-mcp"
full_bin = "./tmp/aegisflow-mcp"
include_ext = ["go"]
exclude_dir = ["tmp"]
delay = 300
stop_on_error = true
send_interrupt = true

[log]
time = true

[screen]
clear_on_rebuild = true

