services:
  mysql:
    image: mysql:8.4
    container_name: aegisflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: aegisflow
      MYSQL_USER: aegisflow
      MYSQL_PASSWORD: aegisflow
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
