services:
  mysql:
    image: mysql:8.4
    container_name: aegisflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: aegisflow
      MYSQL_USER: aegisflow
      MYSQL_PASSWORD: aegisflow
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: aegisflow-etcd
    restart: unless-stopped
    command:
      - etcd
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    volumes:
      - etcd_data:/etcd

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: aegisflow-minio
    restart: unless-stopped
    command: minio server /minio_data --console-address ":9001"
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio_data

  milvus:
    image: milvusdb/milvus:v2.4.23
    container_name: aegisflow-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      - etcd
      - minio

  mcp:
    image: golang:1.25
    container_name: aegisflow-mcp-dev
    working_dir: /workspace/apps/mcp
    command: ["bash", "/workspace/scripts/run-go-hot.sh", "apps/mcp", "apps/mcp/.air.toml"]
    environment:
      GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
      GOSUMDB: ${GOSUMDB:-sum.golang.google.cn}
    volumes:
      - .:/workspace
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    ports:
      - "8090:8090"
    depends_on:
      - mysql

  api:
    image: golang:1.25
    container_name: aegisflow-api-dev
    working_dir: /workspace/apps/api
    command: ["bash", "/workspace/scripts/run-go-hot.sh", "apps/api", "apps/api/.air.toml"]
    environment:
      GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
      GOSUMDB: ${GOSUMDB:-sum.golang.google.cn}
      GF_GCFG_FILE: config.compose.yaml
      AEGISFLOW_MCP_SSE_URL: http://mcp:8090/sse
      AEGISFLOW_MILVUS_ADDR: milvus:19530
      AEGISFLOW_OPENAI_BASE_URL: ${AEGISFLOW_OPENAI_BASE_URL:-}
      AEGISFLOW_OPENAI_API_KEY: ${AEGISFLOW_OPENAI_API_KEY:-}
      AEGISFLOW_CHAT_MODEL: ${AEGISFLOW_CHAT_MODEL:-}
      AEGISFLOW_EMBEDDING_MODEL: ${AEGISFLOW_EMBEDDING_MODEL:-}
    volumes:
      - .:/workspace
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    ports:
      - "6872:6872"
    depends_on:
      mysql:
        condition: service_healthy
      milvus:
        condition: service_started
      mcp:
        condition: service_started

  web:
    image: node:24
    container_name: aegisflow-web-dev
    working_dir: /workspace
    command: ["bash", "-lc", "npm ci && npm run generate:api && npm run dev:web"]
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    volumes:
      - .:/workspace
      - node_modules_cache:/workspace/node_modules
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_started

volumes:
  mysql_data:
  etcd_data:
  minio_data:
  milvus_data:
  go_mod_cache:
  go_build_cache:
  node_modules_cache:
