openapi: 3.1.0
info:
  title: AegisFlow Agent Platform API
  version: 2.0.0
  description: OpenAPI contract for the upgraded AegisFlow GoFrame + Eino + RAG + MCP platform.
servers:
  - url: http://localhost:6872
    description: Local API server
tags:
  - name: Sessions
  - name: Runs
  - name: Knowledge
  - name: Tools
paths:
  /api/v2/sessions:
    post:
      tags: [Sessions]
      summary: Create an agent session
      operationId: createSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
      responses:
        "200":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
  /api/v2/runs/chat:
    post:
      tags: [Runs]
      summary: Run a chat agent task
      operationId: runChat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRunRequest"
      responses:
        "200":
          description: Chat run result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunResponse"
  /api/v2/runs/chat/stream:
    post:
      tags: [Runs]
      summary: Stream a chat agent task
      operationId: runChatStream
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRunRequest"
      responses:
        "200":
          description: SSE stream of run events
          content:
            text/event-stream:
              schema:
                type: string
                description: SSE events named run_event, error, done
  /api/v2/runs/ops:
    post:
      tags: [Runs]
      summary: Run an operations supervisor workflow
      operationId: runOps
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpsRunRequest"
      responses:
        "200":
          description: Ops run result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunResponse"
  /api/v2/runs/{runId}:
    get:
      tags: [Runs]
      summary: Get a run with event summary
      operationId: getRun
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Run detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunResponse"
  /api/v2/runs/{runId}/events:
    get:
      tags: [Runs]
      summary: List stored run events
      operationId: listRunEvents
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Run events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunEventListResponse"
  /api/v2/runs/{runId}/resume:
    post:
      tags: [Runs]
      summary: Resume an interrupted run
      operationId: resumeRun
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResumeRunRequest"
      responses:
        "200":
          description: Resumed run result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunResponse"
  /api/v2/knowledge/documents:
    post:
      tags: [Knowledge]
      summary: Upload a knowledge document
      operationId: uploadKnowledgeDocument
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Uploaded knowledge document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeDocumentResponse"
  /api/v2/knowledge/index-jobs:
    post:
      tags: [Knowledge]
      summary: Create an asynchronous knowledge indexing job
      operationId: createKnowledgeIndexJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKnowledgeIndexJobRequest"
      responses:
        "200":
          description: Knowledge index job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeIndexJobResponse"
  /api/v2/tools/mcp:
    get:
      tags: [Tools]
      summary: List MCP tools discovered from the MCP server
      operationId: listMCPTools
      responses:
        "200":
          description: Tool catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MCPToolListResponse"
components:
  schemas:
    CreateSessionRequest:
      type: object
      properties:
        title:
          type: string
        mode:
          type: string
          example: general
    ChatRunRequest:
      type: object
      required: [sessionId, query]
      properties:
        sessionId:
          type: string
        query:
          type: string
        topK:
          type: integer
          default: 4
    OpsRunRequest:
      type: object
      required: [sessionId, alertTitle, serviceName, severity, summary]
      properties:
        sessionId:
          type: string
        alertTitle:
          type: string
        serviceName:
          type: string
        severity:
          type: string
          enum: [critical, warning, info]
        summary:
          type: string
    ResumeRunRequest:
      type: object
      properties:
        interruptId:
          type: string
        approved:
          type: boolean
        note:
          type: string
    CreateKnowledgeIndexJobRequest:
      type: object
      properties:
        documentIds:
          type: array
          items:
            type: string
        chunkSize:
          type: integer
          default: 500
        overlap:
          type: integer
          default: 80
        topK:
          type: integer
          default: 4
    Session:
      type: object
      required: [id, title, mode, createdAt, updatedAt]
      properties:
        id:
          type: string
        title:
          type: string
        mode:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    InterruptContext:
      type: object
      required: [id, address, isRootCause]
      properties:
        id:
          type: string
        address:
          type: string
        info:
          description: Interrupt metadata provided by the paused component
        isRootCause:
          type: boolean
    InterruptData:
      type: object
      properties:
        contexts:
          type: array
          items:
            $ref: "#/components/schemas/InterruptContext"
    RunEvent:
      type: object
      required: [id, runId, sequence, eventType, createdAt]
      properties:
        id:
          type: string
        runId:
          type: string
        sequence:
          type: integer
        eventType:
          type: string
          example: tool_call
        agentName:
          type: string
        role:
          type: string
        toolName:
          type: string
        content:
          type: string
        payload:
          description: Event-specific JSON payload
        createdAt:
          type: string
          format: date-time
    Run:
      type: object
      required: [id, sessionId, runType, status, summary, checkpointId, createdAt, updatedAt]
      properties:
        id:
          type: string
        sessionId:
          type: string
        runType:
          type: string
          enum: [chat, ops]
        status:
          type: string
          enum: [running, completed, interrupted, failed]
        summary:
          type: string
        errorMessage:
          type: string
        checkpointId:
          type: string
        interrupt:
          $ref: "#/components/schemas/InterruptData"
        events:
          type: array
          items:
            $ref: "#/components/schemas/RunEvent"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
    KnowledgeDocument:
      type: object
      required: [id, fileName, title, contentType, filePath, status, sourceType, createdAt, updatedAt]
      properties:
        id:
          type: string
        fileName:
          type: string
        title:
          type: string
        contentType:
          type: string
        filePath:
          type: string
        status:
          type: string
        sourceType:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    KnowledgeIndexJob:
      type: object
      required: [id, status, collectionName, chunkSize, overlap, topK, indexedChunks, createdAt, updatedAt]
      properties:
        id:
          type: string
        documentId:
          type: string
        status:
          type: string
          enum: [queued, running, completed, failed]
        collectionName:
          type: string
        chunkSize:
          type: integer
        overlap:
          type: integer
        topK:
          type: integer
        indexedChunks:
          type: integer
        errorMessage:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
    MCPToolDescriptor:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        schemaJson:
          type: string
    SessionResponse:
      type: object
      required: [message, data]
      properties:
        message:
          type: string
        data:
          $ref: "#/components/schemas/Session"
    RunResponse:
      type: object
      required: [message, data]
      properties:
        message:
          type: string
        data:
          $ref: "#/components/schemas/Run"
    RunEventListResponse:
      type: object
      required: [message, data]
      properties:
        message:
          type: string
        data:
          type: array
          items:
            $ref: "#/components/schemas/RunEvent"
    KnowledgeDocumentResponse:
      type: object
      required: [message, data]
      properties:
        message:
          type: string
        data:
          $ref: "#/components/schemas/KnowledgeDocument"
    KnowledgeIndexJobResponse:
      type: object
      required: [message, data]
      properties:
        message:
          type: string
        data:
          $ref: "#/components/schemas/KnowledgeIndexJob"
    MCPToolListResponse:
      type: object
      required: [message, data]
      properties:
        message:
          type: string
        data:
          type: array
          items:
            $ref: "#/components/schemas/MCPToolDescriptor"
